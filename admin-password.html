<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="admin-body">
    <div class="admin-shell admin-shell-narrow">
      <header class="admin-header">
        <div>
          <p class="admin-kicker">Soap Property Design Tool</p>
          <h1>Change Admin Password</h1>
        </div>
        <div class="admin-header-actions">
          <a class="btn btn-small" href="./admin-tools.html">Back to Admin</a>
        </div>
      </header>

      <section class="panel admin-panel">
        <p class="admin-helper">Update the Supabase-backed admin password for oil moderation.</p>
        <form class="admin-form" id="changePasswordForm">
          <div class="field">
            <label for="currentPassword">Current Password</label>
            <input id="currentPassword" name="currentPassword" type="password" required>
          </div>
          <div class="field">
            <label for="newPassword">New Password</label>
            <input id="newPassword" name="newPassword" type="password" minlength="10" required>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="10" required>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Update Password</button>
          </div>
          <p class="admin-status" id="changePasswordStatus"></p>
        </form>
      </section>
    </div>

    <script src="./admin-password.js"></script>
  </body>
</html>

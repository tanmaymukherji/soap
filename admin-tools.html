<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soap Oil Admin Approval</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="admin-body auth-loading">
    <div class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-kicker">Soap Property Design Tool</p>
          <h1>Soap Oil Admin Approval</h1>
        </div>
        <div class="admin-header-actions">
          <a class="btn btn-small" href="./index.html">Back to Tool</a>
        </div>
      </header>

      <main class="admin-grid">
        <section class="panel admin-panel">
          <h2 class="section-title">Admin Login</h2>
          <form class="admin-form" id="loginForm">
            <div class="field">
              <label for="adminPassword">Admin Password</label>
              <input id="adminPassword" name="adminPassword" type="password" placeholder="Enter admin password" required>
            </div>
            <div class="btn-row">
              <button class="btn btn-primary" type="submit">Sign In</button>
            </div>
            <p class="admin-status" id="loginStatus"></p>
          </form>

          <div id="sessionPanel" class="session-panel">
            <h2 class="section-title">Admin Controls</h2>
            <div class="btn-row">
              <a class="btn btn-small" href="./admin-password.html">Change Password</a>
              <button class="btn btn-small" type="button" id="refreshQueue">Refresh Queue</button>
              <button class="btn btn-danger btn-small" type="button" id="signOutButton">Sign Out</button>
            </div>
            <p class="admin-status" id="sessionStatus"></p>
          </div>
        </section>

        <section class="panel admin-panel queue-panel" id="queuePanel">
          <h2 class="section-title">Pending Oil Queue</h2>
          <p class="admin-helper" id="queueMeta">Sign in as admin to load pending oil submissions.</p>
          <div class="admin-card-list" id="queueList"></div>
        </section>

        <section class="panel admin-panel queue-panel" id="allOilsPanel">
          <h2 class="section-title">All Oil Records</h2>
          <p class="admin-helper" id="allOilsMeta">Sign in as admin to load all oil records.</p>
          <div class="field">
            <label for="oilSearch">Search Oil Records</label>
            <input id="oilSearch" type="search" placeholder="Type an oil name to filter the records">
          </div>
          <div class="admin-card-list" id="allOilsList"></div>

          <div class="submission-panel" id="editOilPanel" hidden>
            <h3 class="subheading" id="editOilTitle">Edit Oil Record</h3>
            <form id="editOilForm" class="submission-form">
              <div class="field-grid">
                <div class="field">
                  <label for="editOilName">Oil Name</label>
                  <input id="editOilName" type="text" required>
                </div>
                <div class="field">
                  <label for="editSubmittedBy">Submitted By</label>
                  <input id="editSubmittedBy" type="text">
                </div>
                <div class="field">
                  <label for="editNaohSap">NaOH SAP</label>
                  <input id="editNaohSap" type="number" step="0.001" required>
                </div>
                <div class="field">
                  <label for="editKohSap">KOH SAP</label>
                  <input id="editKohSap" type="number" step="0.001" required>
                </div>
                <div class="field">
                  <label for="editHardness">Hardness</label>
                  <input id="editHardness" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editCleansing">Cleansing</label>
                  <input id="editCleansing" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editCondition">Condition</label>
                  <input id="editCondition" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editBubbly">Bubbly</label>
                  <input id="editBubbly" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editCreamy">Creamy</label>
                  <input id="editCreamy" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editIodine">Iodine</label>
                  <input id="editIodine" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editIns">INS</label>
                  <input id="editIns" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editLauric">Lauric</label>
                  <input id="editLauric" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editMyristic">Myristic</label>
                  <input id="editMyristic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editPalmitic">Palmitic</label>
                  <input id="editPalmitic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editStearic">Stearic</label>
                  <input id="editStearic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editRicinoleic">Ricinoleic</label>
                  <input id="editRicinoleic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editOleic">Oleic</label>
                  <input id="editOleic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editLinoleic">Linoleic</label>
                  <input id="editLinoleic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editLinolenic">Linolenic</label>
                  <input id="editLinolenic" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editSaturated">Saturated</label>
                  <input id="editSaturated" type="number" step="0.1">
                </div>
                <div class="field">
                  <label for="editUnsaturated">Unsaturated</label>
                  <input id="editUnsaturated" type="number" step="0.1">
                </div>
              </div>
              <div class="btn-row">
                <button class="btn btn-primary" type="submit">Save Changes</button>
                <button class="btn btn-small" type="button" id="cancelEditButton">Cancel</button>
              </div>
              <p class="admin-status" id="editOilStatus"></p>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="./admin-tools.js"></script>
  </body>
</html>
